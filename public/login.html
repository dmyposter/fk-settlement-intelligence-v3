<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FK Settlement Login</title>
<style>
body{margin:0;font-family:Segoe UI;background:#07070b;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:420px;background:linear-gradient(135deg,#11111a,#181825);padding:35px;border-radius:28px;border:1px solid rgba(255,255,255,.08);box-shadow:0 0 50px rgba(124,58,237,.25)}
h1{text-align:center;margin:0 0 10px}.sub{text-align:center;color:#bbb;margin-bottom:25px}
input{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:1px solid #2b2b40;background:#1a1a2b;color:#fff}
button{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#c084fc);color:#fff;font-weight:700;cursor:pointer}
a{color:#d8b4fe;text-decoration:none}.footer{text-align:center;margin-top:18px}
</style></head>
<body><div class="card">
<h1>🚀 FK Settlement</h1><div class="sub">Login to continue</div>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="loginBtn">Login</button>
<div class="footer">New User? <a href="signup.html">Create Account</a></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="auth.js"></script>

<script>
document.getElementById("loginBtn").onclick = async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await firebase.auth()
.signInWithEmailAndPassword(
email,
password
);

window.location =
"index.html";

}
catch(err){

alert(err.message);

}

};
</script>
</body></html>
