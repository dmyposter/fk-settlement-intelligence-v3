<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FK Settlement Login</title>
<style>
body{margin:0;font-family:Segoe UI;background:#07070b;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{width:420px;background:linear-gradient(135deg,#11111a,#181825);padding:35px;border-radius:28px;border:1px solid rgba(255,255,255,.08);box-shadow:0 0 50px rgba(124,58,237,.25)}
h1{text-align:center;margin:0 0 10px}.sub{text-align:center;color:#bbb;margin-bottom:25px}
input{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:1px solid #2b2b40;background:#1a1a2b;color:#fff}
button{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#c084fc);color:#fff;font-weight:700;cursor:pointer}
a{color:#d8b4fe;text-decoration:none}.footer{text-align:center;margin-top:18px}
.google-btn{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:14px;
background:#fff;
color:#222;
font-weight:700;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.google-btn:hover{
background:#f3f4f6;
}
  
  .google-btn{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#fff;
color:#222;
font-weight:700;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:18px;
}

.google-btn:hover{
background:#f3f4f6;
}

.divider{
position:relative;
text-align:center;
margin:20px 0;
}

.divider:before{
content:"";
position:absolute;
left:0;
top:50%;
width:100%;
height:1px;
background:#2b2b40;
}

.divider span{
background:#11111a;
padding:0 14px;
position:relative;
color:#aaa;
font-size:13px;
}
</style></head>
<body><div class="card">

<h1>🚀 FK Settlement</h1>

<div class="sub">
Login to continue
</div>

<!-- GOOGLE LOGIN -->

<button type="button" id="googleLoginBtn" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
    Continue with Google
</button>

<div class="divider">
    <span>OR</span>
</div>

<!-- EMAIL LOGIN -->

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<div style="text-align:right;margin-top:10px;">
<a href="#" id="forgotPassword">
Forgot Password?
</a>
</div>

<div class="footer">
New User?
<a href="signup.html">
Create Account
</a>
</div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="auth.js"></script>

<script>
document.getElementById("loginBtn").onclick = async () => {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await firebase.auth()
.signInWithEmailAndPassword(
email,
password
);

window.location =
"index.html";

}
catch(err){

alert(err.message);

}

};

const provider =
new firebase.auth.GoogleAuthProvider();

document
.getElementById("googleLoginBtn")
.addEventListener("click", async () => {

    try{

        const result =
        await firebase.auth()
        .signInWithPopup(provider);

        const user =
        result.user;

        if(!user.displayName){

            await user.updateProfile({
                displayName:
                user.email.split("@")[0]
            });

        }

        window.location =
        "index.html";

    }

    catch(error){

        alert(error.message);

    }

});
</script>
</body></html>
